<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pulse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('pulse.dashboard') }}">Pulse</a>
      <nav>
        <a href="{{ url_for('pulse.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('pulse.data_source') }}">Data Source</a>
        <a href="{{ url_for('pulse.requests_index') }}">Requests</a>
        <a href="{{ url_for('pulse.reminders') }}">Reminders</a>
        <a href="{{ url_for('pulse.reports') }}">Reports</a>
      </nav>
    </header>

    <main class="shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="alerts">
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
